<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Random DOAJ Article Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
        }

        button:hover {
            background: #6366f1;
        }

        .card {
            margin-top: 30px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 12px;
        }

        .title {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .meta {
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .abstract {
            line-height: 1.7;
        }

        a {
            color: #8ab4ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .loading {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Random Research Article Finder</h1>

    <input
        type="text"
        id="topicInput"
        placeholder="Enter a topic..."
    >

    <button id="searchButton">
        Find Random Article
    </button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>

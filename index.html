<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Site</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: white;
    }

    header {
        text-align: center;
        padding: 40px 20px;
    }

    header h1 {
        margin: 0;
        font-size: 2.5rem;
    }

    header p {
        color: #aaa;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
    }

    .section {
        margin-top: 40px;
    }

    .section h2 {
        border-bottom: 1px solid #222;
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 15px;
    }

    a.card {
        display: block;
        padding: 15px;
        background: #1a1a1a;
        border-radius: 10px;
        text-decoration: none;
        color: white;
        transition: 0.2s;
    }

    a.card:hover {
        background: #2a2a2a;
        transform: translateY(-2px);
    }

    .tag {
        font-size: 12px;
        color: #888;
        margin-top: 5px;
    }
</style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Music • Projects • Links</p>
</header>

<div class="container">

    <div class="section">
        <h2>Pages</h2>
        <div id="pages" class="grid"></div>
    </div>

    <div class="section">
        <h2>External Links</h2>
        <div id="links" class="grid"></div>
    </div>

</div>

<script>
/**
 * =========================
 * EASY EDIT CONFIG SECTION
 * =========================
 */

const pages = [
    { name: "Home", url: "/", desc: "Main landing page" },
    { name: "Blog", url: "https://blog.scoreladder.org", desc: "Dev logs and updates" },
    { name: "Articles", url: "/articles/", desc: "Test out our article and question generator test!" }
];

const externalLinks = [
    { name: "Discord", url: "https://discord.com/invite/YOUR_INVITE", desc: "Join our community, become a tester" },
    { name: "Interest Form", url: "https://forms.gle/LAgDeZZH6BArEHzM9", desc: "Fill out our interest form!" }
];

/**
 * =========================
 * RENDER FUNCTION
 * =========================
 */

function render(list, elementId) {
    const container = document.getElementById(elementId);

    list.forEach(item => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = item.url;

        a.innerHTML = `
            <div><strong>${item.name}</strong></div>
            <div class="tag">${item.desc || ""}</div>
        `;

        container.appendChild(a);
    });
}

render(pages, "pages");
render(externalLinks, "links");
</script>

</body>
</html>

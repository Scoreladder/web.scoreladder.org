<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreladder Homepage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
</style>
</head>

<body>


<script>
/**
 * =========================
 * EASY EDIT CONFIG SECTION
 * =========================
 */

const pages = [
    { name: "Home", url: "/", desc: "Main landing page" },
    { name: "Blog", url: "https://blog.scoreladder.org", desc: "Dev logs and updates" },
    { name: "Article (Proof of Concept)", url: "/article/", desc: "Test out our article and question generator test!" }
];

const externalLinks = [
    { name: "Discord", url: "https://discord.com/invite/Zr8s3GnHNv", desc: "Join our community, become a tester" },
    { name: "Interest Form", url: "https://forms.gle/LAgDeZZH6BArEHzM9", desc: "Fill out our interest form!" },
    { name: "Contact", url: "mailto:devs@scoreladder.org", desc: "Send us an email!" }
];

/**
 * =========================
 * RENDER FUNCTION
 * =========================
 */

function render(list, elementId) {
    const container = document.getElementById(elementId);

    list.forEach(item => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = item.url;

        a.innerHTML = `
            <div><strong>${item.name}</strong></div>
            <div class="tag">${item.desc || ""}</div>
        `;

        container.appendChild(a);
    });
}

render(pages, "pages");
render(externalLinks, "links");
</script>

</body>
</html>
